<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPX 案件排查中心 — 單檔離線 Demo（內嵌 CSV）</title>
    <style>
      /* antd@6.3.5/dist/reset.css — 內嵌，無需 CDN */
      html,
      body {
        width: 100%;
        height: 100%;
      }
      input::-ms-clear,
      input::-ms-reveal {
        display: none;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html {
        font-family: sans-serif;
        line-height: 1.15;
        -webkit-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
        -ms-overflow-style: scrollbar;
        -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
      }

      body {
        margin: 0;
      }
      [tabindex='-1']:focus {
        outline: none;
      }
      hr {
        box-sizing: content-box;
        height: 0;
        overflow: visible;
      }
      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        margin-top: 0;
        margin-bottom: 0.5em;
        font-weight: 500;
      }
      p {
        margin-top: 0;
        margin-bottom: 1em;
      }
      abbr[title],
      abbr[data-original-title] {
        -webkit-text-decoration: underline dotted;
        text-decoration: underline dotted;
        border-bottom: 0;
        cursor: help;
      }
      address {
        margin-bottom: 1em;
        font-style: normal;
        line-height: inherit;
      }
      input[type='text'],
      input[type='password'],
      input[type='number'],
      textarea {
        -webkit-appearance: none;
      }
      ol,
      ul,
      dl {
        margin-top: 0;
        margin-bottom: 1em;
      }
      ol ol,
      ul ul,
      ol ul,
      ul ol {
        margin-bottom: 0;
      }
      dt {
        font-weight: 500;
      }
      dd {
        margin-bottom: 0.5em;
        margin-left: 0;
      }
      blockquote {
        margin: 0 0 1em;
      }
      dfn {
        font-style: italic;
      }
      b,
      strong {
        font-weight: bolder;
      }
      small {
        font-size: 80%;
      }
      sub,
      sup {
        position: relative;
        font-size: 75%;
        line-height: 0;
        vertical-align: baseline;
      }
      sub {
        bottom: -0.25em;
      }
      sup {
        top: -0.5em;
      }
      pre,
      code,
      kbd,
      samp {
        font-size: 1em;
        font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace;
      }
      pre {
        margin-top: 0;
        margin-bottom: 1em;
        overflow: auto;
      }
      figure {
        margin: 0 0 1em;
      }
      img {
        vertical-align: middle;
        border-style: none;
      }
      a,
      area,
      button,
      [role='button'],
      input:not([type='range']),
      label,
      select,
      summary,
      textarea {
        touch-action: manipulation;
      }
      table {
        border-collapse: collapse;
      }
      caption {
        padding-top: 0.75em;
        padding-bottom: 0.3em;
        text-align: left;
        caption-side: bottom;
      }
      input,
      button,
      select,
      optgroup,
      textarea {
        margin: 0;
        color: inherit;
        font-size: inherit;
        font-family: inherit;
        line-height: inherit;
      }
      button,
      input {
        overflow: visible;
      }
      button,
      select {
        text-transform: none;
      }
      button,
      html [type='button'],
      [type='reset'],
      [type='submit'] {
        -webkit-appearance: button;
      }
      button::-moz-focus-inner,
      [type='button']::-moz-focus-inner,
      [type='reset']::-moz-focus-inner,
      [type='submit']::-moz-focus-inner {
        padding: 0;
        border-style: none;
      }
      input[type='radio'],
      input[type='checkbox'] {
        box-sizing: border-box;
        padding: 0;
      }
      input[type='date'],
      input[type='time'],
      input[type='datetime-local'],
      input[type='month'] {
        -webkit-appearance: listbox;
      }
      textarea {
        overflow: auto;
        resize: vertical;
      }
      fieldset {
        min-width: 0;
        margin: 0;
        padding: 0;
        border: 0;
      }
      legend {
        display: block;
        width: 100%;
        max-width: 100%;
        margin-bottom: 0.5em;
        padding: 0;
        color: inherit;
        font-size: 1.5em;
        line-height: inherit;
        white-space: normal;
      }
      progress {
        vertical-align: baseline;
      }
      [type='number']::-webkit-inner-spin-button,
      [type='number']::-webkit-outer-spin-button {
        height: auto;
      }
      [type='search'] {
        outline-offset: -2px;
        -webkit-appearance: none;
      }
      [type='search']::-webkit-search-cancel-button,
      [type='search']::-webkit-search-decoration {
        -webkit-appearance: none;
      }
      ::-webkit-file-upload-button {
        font: inherit;
        -webkit-appearance: button;
      }
      output {
        display: inline-block;
      }
      summary {
        display: list-item;
      }
      template {
        display: none;
      }
      [hidden] {
        display: none !important;
      }

      /* 與 src/twtc-tokens.css、App.css 對齊 */
      :root {
        --twtc-color-primary: #ee4d2d;
        --twtc-color-primary-hover: #f05a41;
        --twtc-color-primary-active: #d7321a;
        --twtc-color-link: #0088ff;
        --twtc-color-error: #ff424f;
        --twtc-color-text: #262626;
        --twtc-color-text-secondary: #595959;
        --twtc-color-text-tertiary: #8c8c8c;
        --twtc-color-bg-layout: #f5f5f5;
        --twtc-color-bg-container: #ffffff;
        --twtc-color-fill-secondary: #fafafa;
        --twtc-color-border: #f0f0f0;
        --twtc-color-border-secondary: #e8e8e8;
        --twtc-menu-selected-bg: #fff1f0;
        --twtc-menu-selected-text: #cf1322;
        --twtc-radius-sm: 4px;
        --twtc-radius-md: 8px;
        --twtc-shadow-card: 0 1px 2px rgba(0, 0, 0, 0.04);
        /* demo 內既有變數別名 */
        --bg: var(--twtc-color-bg-container);
        --bg-layout: var(--twtc-color-bg-layout);
        --border: var(--twtc-color-border);
        --text: var(--twtc-color-text);
        --muted: var(--twtc-color-text-tertiary);
        --primary: var(--twtc-color-primary);
        --link: var(--twtc-color-link);
        --fill: var(--twtc-color-fill-secondary);
        --radius-sm: var(--twtc-radius-sm);
        --radius-md: var(--twtc-radius-md);
        --shadow: var(--twtc-shadow-card);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          'Noto Sans TC',
          'PingFang TC',
          'Microsoft JhengHei',
          sans-serif;
        color: var(--text);
        background: var(--bg);
        font-size: 14px;
      }

      .file-warn {
        margin: 0;
        padding: 10px 16px;
        background: #fff7e6;
        border-bottom: 1px solid #ffd591;
        color: #ad6800;
        font-size: 13px;
      }

      .standalone-banner {
        background: #e6f4ff !important;
        border-bottom: 1px solid #91caff !important;
        color: #0958d9 !important;
      }

      .standalone-banner code {
        font-size: 12px;
        padding: 1px 6px;
        background: rgba(255, 255, 255, 0.75);
        border-radius: 4px;
      }

      .load-err {
        margin: 12px 16px;
        padding: 12px;
        background: #fff2f0;
        border: 1px solid #ffccc7;
        border-radius: var(--radius-sm);
        color: #a8071a;
        font-size: 13px;
      }

      .topbar {
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        border-bottom: 1px solid var(--twtc-color-border-secondary);
        background: var(--twtc-color-bg-container);
        position: sticky;
        top: 0;
        z-index: 1001;
        box-shadow: 0 1px 0 rgba(0, 0, 0, 0.02);
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .logo-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 6px;
        background-color: var(--twtc-color-primary);
        color: #fff;
        flex-shrink: 0;
      }

      .logo-icon svg {
        display: block;
      }

      .logo-text {
        font-weight: 600;
        font-size: 15px;
        color: var(--twtc-color-text);
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--muted);
      }

      .user-trigger {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 4px 8px;
        margin: 0;
        border: none;
        border-radius: var(--twtc-radius-sm);
        background: transparent;
        font: inherit;
        cursor: pointer;
        color: var(--twtc-color-text);
        transition: background-color 0.2s ease;
      }

      .user-trigger:hover {
        background: var(--twtc-color-bg-layout);
      }

      .avatar {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background-color: #fde3cf;
        color: #d46b08;
        display: grid;
        place-items: center;
        font-size: 11px;
        font-weight: 600;
      }

      .shell {
        display: grid;
        grid-template-columns: 232px 1fr;
        min-height: calc(100vh - 48px);
      }

      .sider {
        border-right: 1px solid var(--twtc-color-border-secondary);
        background: var(--twtc-color-bg-layout);
        padding: 8px 0 48px;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
        margin: 2px 8px;
        width: calc(100% - 16px);
        border-radius: var(--twtc-radius-sm);
        color: var(--twtc-color-text);
        cursor: default;
        font-size: 14px;
        transition: background-color 0.2s ease;
      }

      .nav-item:hover:not(.is-active) {
        background: #ebebeb;
      }

      .nav-item.is-active {
        background: var(--twtc-menu-selected-bg);
        color: var(--twtc-menu-selected-text);
        font-weight: 600;
        box-shadow: inset 3px 0 0 var(--twtc-menu-selected-text);
      }

      .nav-item .nav-ico {
        width: 18px;
        text-align: center;
        opacity: 0.85;
      }

      .main {
        padding: 0;
        min-width: 0;
        background: var(--bg-layout);
      }

      .breadcrumb-bar {
        padding: 10px 16px;
        background: var(--twtc-color-fill-secondary);
        border-bottom: 1px solid var(--twtc-color-border);
        font-size: 13px;
        color: var(--twtc-color-text-tertiary);
      }

      .breadcrumb-bar span + span::before {
        content: ' / ';
        color: var(--twtc-color-border-secondary);
        margin: 0 2px;
      }

      .breadcrumb-bar span:last-child {
        color: var(--twtc-color-text);
        font-weight: 500;
      }

      .page-head {
        padding: 16px 16px 8px;
        margin-bottom: 12px;
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .page-title {
        margin: 0 0 4px;
        font-size: 20px;
        font-weight: 600;
        line-height: 1.35;
        color: var(--twtc-color-text);
      }

      .page-desc {
        margin: 0;
        font-size: 13px;
        color: var(--twtc-color-text-tertiary);
        max-width: 720px;
        line-height: 1.55;
      }

      .page-head--live {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 12px 16px;
      }

      .page-head-main {
        flex: 1 1 280px;
        min-width: 0;
      }

      .page-head-toolbar {
        flex-shrink: 0;
      }

      .content-inner {
        padding: 0 16px 24px;
      }

      .tabs {
        display: flex;
        gap: 6px;
        margin-top: 12px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }

      .content-inner > .tabs {
        margin-top: 0;
      }

      .tab {
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid var(--twtc-color-border-secondary);
        background: var(--twtc-color-bg-container);
        cursor: pointer;
        font: inherit;
        font-size: 13px;
        color: var(--twtc-color-text-secondary);
        transition:
          color 0.2s ease,
          border-color 0.2s ease,
          background-color 0.2s ease;
      }

      .tab:hover {
        border-color: var(--twtc-color-primary);
        color: var(--twtc-color-primary);
      }

      .tab:focus-visible {
        outline: 2px solid var(--twtc-color-link);
        outline-offset: 2px;
      }

      .tab.is-active {
        border-color: var(--twtc-color-primary);
        color: var(--twtc-color-primary);
        font-weight: 500;
        background: #fffaf8;
      }

      .card {
        background: var(--twtc-color-bg-container);
        border-radius: var(--twtc-radius-sm);
        box-shadow: var(--twtc-shadow-card);
        padding: 16px;
        border: 1px solid var(--twtc-color-border);
      }

      .filter-bar {
        margin-bottom: 12px;
      }

      .filter-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 12px 16px;
        align-items: flex-end;
        background: var(--twtc-color-fill-secondary);
        border: 1px solid var(--twtc-color-border);
        border-radius: var(--twtc-radius-md);
        padding: 14px 12px 12px;
      }

      .field {
        flex: 1 1 160px;
        min-width: 140px;
      }

      .field label {
        display: block;
        font-size: 13px;
        color: var(--twtc-color-text-secondary);
        margin-bottom: 6px;
      }

      .field input,
      .field select,
      .field textarea {
        width: 100%;
        min-height: 32px;
        border: 1px solid var(--twtc-color-border-secondary);
        border-radius: var(--twtc-radius-sm);
        padding: 6px 11px;
        font: inherit;
        background: var(--twtc-color-bg-container);
        color: var(--twtc-color-text);
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      .field input:hover,
      .field select:hover,
      .field textarea:hover {
        border-color: var(--twtc-color-primary);
      }

      .field input:focus-visible,
      .field select:focus-visible,
      .field textarea:focus-visible {
        outline: none;
        border-color: var(--twtc-color-link);
        box-shadow: 0 0 0 2px rgba(0, 136, 255, 0.12);
      }

      .field textarea {
        min-height: 64px;
        resize: vertical;
      }

      .filter-actions {
        flex: 0 0 auto;
        display: flex;
        gap: 8px;
        padding-bottom: 2px;
      }

      .btn {
        height: 32px;
        border: 1px solid var(--twtc-color-border-secondary);
        border-radius: var(--twtc-radius-sm);
        background: var(--twtc-color-bg-container);
        padding: 0 15px;
        cursor: pointer;
        font: inherit;
        font-size: 13px;
        color: var(--twtc-color-text);
        transition:
          background-color 0.2s ease,
          border-color 0.2s ease,
          color 0.2s ease;
      }

      .btn:hover:not(:disabled) {
        border-color: var(--twtc-color-primary);
        color: var(--twtc-color-primary);
      }

      .btn:focus-visible {
        outline: 2px solid var(--twtc-color-link);
        outline-offset: 1px;
      }

      .btn.primary {
        background: var(--twtc-color-primary);
        border-color: var(--twtc-color-primary);
        color: #fff;
      }

      .btn.primary:hover:not(:disabled) {
        background: var(--twtc-color-primary-hover);
        border-color: var(--twtc-color-primary-hover);
        color: #fff;
      }

      .btn.primary:active:not(:disabled) {
        background: var(--twtc-color-primary-active);
        border-color: var(--twtc-color-primary-active);
      }

      .btn.link {
        border: none;
        background: none;
        color: var(--twtc-color-link);
        padding: 0 4px;
        height: auto;
        min-height: 0;
      }

      .btn.link:hover:not(:disabled) {
        color: var(--twtc-color-primary-hover);
      }

      .btn.link:disabled {
        color: #bfbfbf;
        cursor: not-allowed;
      }

      .video-link {
        font-weight: 500;
      }

      .video-link-disabled {
        color: #bfbfbf !important;
        font-weight: 400;
      }

      .table-wrap {
        border: 1px solid var(--twtc-color-border);
        border-radius: var(--twtc-radius-sm);
        overflow: auto;
        max-width: 100%;
        background: var(--twtc-color-bg-container);
      }

      table.data {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
        color: var(--twtc-color-text);
      }

      table.case-table thead th {
        position: sticky;
        top: 0;
        z-index: 1;
        background: var(--twtc-color-fill-secondary);
        text-align: left;
        padding: 12px 10px;
        border-bottom: 1px solid var(--twtc-color-border);
        white-space: nowrap;
        font-weight: 500;
        color: var(--twtc-color-text);
        box-shadow: 0 1px 0 var(--twtc-color-border);
      }

      table.case-table--subtle tbody td {
        padding: 12px 10px;
        border-bottom: 1px solid #f5f5f5;
        vertical-align: top;
        max-width: 280px;
        word-break: break-word;
      }

      table.case-table--subtle tbody tr:last-child td {
        border-bottom: none;
      }

      table.case-table tbody tr:hover {
        background: rgba(0, 0, 0, 0.02);
      }

      .copy-wrap {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        max-width: 100%;
      }

      .copy-btn {
        border: none;
        background: transparent;
        cursor: pointer;
        color: var(--muted);
        padding: 0 4px;
        font-size: 12px;
      }

      .copy-btn:hover {
        color: var(--twtc-color-link);
      }

      .pill {
        display: inline-flex;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 12px;
        border: 1px solid var(--border);
        background: #fff;
      }

      .pill.red {
        color: #cf1322;
        border-color: rgba(207, 19, 34, 0.25);
        background: rgba(207, 19, 34, 0.08);
      }

      .pill.cyan {
        color: #08979c;
        border-color: rgba(8, 151, 156, 0.25);
        background: rgba(8, 151, 156, 0.08);
      }

      .pagination-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 8px;
        padding-top: 12px;
        border-top: 1px solid var(--twtc-color-border);
        font-size: 13px;
        color: var(--twtc-color-text-tertiary);
      }

      .pagination-bar .btns {
        display: flex;
        gap: 8px;
      }

      .empty-hint {
        padding: 32px;
        text-align: center;
        color: var(--muted);
        font-size: 14px;
      }

      /* Detail */
      .detail-card {
        margin: 0 16px 24px;
        padding: 16px;
        background: var(--twtc-color-bg-container);
        border-radius: var(--twtc-radius-md);
        box-shadow: var(--twtc-shadow-card);
        border: 1px solid var(--twtc-color-border);
      }

      .detail-toolbar {
        margin-bottom: 12px;
      }

      .detail-body {
        display: grid;
        grid-template-columns: minmax(280px, 400px) 1fr;
        gap: 16px;
        align-items: start;
      }

      @media (max-width: 960px) {
        .shell {
          grid-template-columns: 1fr;
        }
        .sider {
          display: none;
        }
        .detail-body {
          grid-template-columns: 1fr;
        }
      }

      .panel {
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: #fff;
        overflow: hidden;
      }

      .collapse-hd {
        padding: 12px;
        font-weight: 700;
        background: #fafafa;
        border-bottom: 1px solid var(--border);
      }

      .collapse-bd {
        padding: 12px;
      }

      .desc-row {
        display: grid;
        grid-template-columns: 110px 1fr;
        gap: 8px;
        padding: 8px 0;
        border-bottom: 1px solid #f0f0f0;
        font-size: 13px;
      }

      .desc-row:last-child {
        border-bottom: none;
      }

      .desc-label {
        color: var(--muted);
      }

      .mini-table-wrap {
        overflow-x: auto;
        max-width: 100%;
      }

      table.mini {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }

      table.mini th,
      table.mini td {
        padding: 8px;
        border-bottom: 1px solid #f0f0f0;
        text-align: left;
        white-space: nowrap;
      }

      table.mini th {
        background: #fafafa;
        font-weight: 600;
      }

      .detail-nav-footer {
        display: flex;
        gap: 8px;
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid var(--border);
      }

      .detail-right {
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        overflow: hidden;
        background: #fff;
      }

      .detail-top-tabs {
        display: flex;
        gap: 0;
        border-bottom: 1px solid var(--border);
        background: #fafafa;
      }

      .detail-top-tabs button {
        flex: 1;
        max-width: 160px;
        padding: 12px 16px;
        border: none;
        background: transparent;
        font: inherit;

    <script>
      ;(function () {
        var TAB_PACKAGE = 'package'
        var TAB_KIOSK = 'kiosk'
        var TAB_LIVE = 'live'
        var PAGE_SIZE = 20

        var COPYABLE = { 案件編號: 1, 退貨物流編號: 1, 包裹配送編號: 1 }

        function readEmbeddedCsv(id) {
          var el = document.getElementById(id)
          if (!el) return ''
          return el.textContent.replace(/^\s+|\s+$/g, '')
        }

        var state = {
          packageTable: { columns: [], rows: [] },
          packageDetail: { columns: [], rows: [] },
          kioskTable: { columns: [], rows: [] },
          liveTable: { columns: [], rows: [] },
          liveExtra: [],
          activeTab: TAB_PACKAGE,
          view: 'list',
          detailFrom: TAB_PACKAGE,
          selectedRow: null,
          currentPage: 1,
          packageDetailTab: 'pickup',
          selectedTrackingTab: '0',
          filters: {
            package: { caseId: '', trackingNo: '', from: '', to: '' },
            kiosk: { store: '', taskId: '', vendor: '', abnormal: '', from: '', to: '' },
            live: { trackingRaw: '', from: '', to: '' },
          },
        }

        function normalizeText(v) {
          return String(v == null ? '' : v).trim()
        }

        function includesInsensitive(hay, needle) {
          if (!needle) return true
          return hay.toLowerCase().includes(needle.toLowerCase())
        }

        function parseLooseDateTimeToMs(input) {
          var s = normalizeText(input)
          if (!s) return null
          var ms = Date.parse(s.replace(/-/g, '/'))
          return isNaN(ms) ? null : ms
        }

        function dateInputToMsStart(isoDate) {
          if (!isoDate) return null
          var t = Date.parse(isoDate + 'T00:00:00')
          return isNaN(t) ? null : t
        }

        function dateInputToMsEnd(isoDate) {
          if (!isoDate) return null
          var t = Date.parse(isoDate + 'T23:59:59.999')
          return isNaN(t) ? null : t
        }

        function parseCsvLine(line) {
          var cells = []
          var i = 0
          var current = ''
          var inQuotes = false
          while (i < line.length) {
            var ch = line[i]
            if (inQuotes) {
              if (ch === '"') {
                var next = line[i + 1]
                if (next === '"') {
                  current += '"'
                  i += 2
                  continue
                }
                inQuotes = false
                i += 1
                continue
              }
              current += ch
              i += 1
              continue
            }
            if (ch === '"') {
              inQuotes = true
              i += 1
              continue
            }
            if (ch === ',') {
              cells.push(current)
              current = ''
              i += 1
              continue
            }
            current += ch
            i += 1
          }
          cells.push(current)
          return cells
        }

        function parseCsvText(text) {
          var lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n')
          var nonEmpty = lines.filter(function (l) {
            return l.trim().length > 0
          })
          if (nonEmpty.length === 0) return { columns: [], rows: [] }

          var headerLineIdx = 0
          var scan = Math.min(nonEmpty.length, 12)
          for (var idx = 0; idx < scan; idx++) {
            var L = nonEmpty[idx]
            if (
              L.indexOf('案件編號') !== -1 ||
              L.indexOf('任務編號') !== -1 ||
              L.indexOf('包裹配送編號') !== -1
            ) {
              headerLineIdx = idx
              break
            }
          }

          var rawHeaders = parseCsvLine(nonEmpty[headerLineIdx]).map(function (h) {
            return h.trim()
          })
          var columns = rawHeaders.map(function (title, idx) {
            return { title: title, key: title.length > 0 ? title : '__col_' + idx }
          })

          var rows = []
          for (var r = headerLineIdx + 1; r < nonEmpty.length; r++) {
            var cells = parseCsvLine(nonEmpty[r])
            var row = { key: String(rows.length + 1) }
            for (var c = 0; c < columns.length; c++) {
              row[columns[c].key] = (cells[c] || '').trim()
            }
            rows.push(row)
          }
          return { columns: columns, rows: rows }
        }

        function escapeHtml(s) {
          return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
        }

        function cellHtml(colKey, colTitle, rawVal) {
          var v = normalizeText(rawVal)
          var display = v || '—'
          var inner = escapeHtml(display)
          if (COPYABLE[colTitle]) {
            inner =
              '<span class="copy-wrap"><span>' +
              inner +
              '</span><button type="button" class="copy-btn" data-copy="' +
              escapeHtml(v) +
              '" title="複製">⎘</button></span>'
          }
          return inner
        }

        function renderStatusPill(v) {
          var t = normalizeText(v)
          if (!t) return '—'
          if (t === '未取件') return '<span class="pill red">' + escapeHtml(t) + '</span>'
          return '<span class="pill cyan">' + escapeHtml(t) + '</span>'
        }

        function filteredPackageRows() {
          var f = state.filters.package
          var caseNeedle = normalizeText(f.caseId)
          var trackNeedle = normalizeText(f.trackingNo)
          var fromMs = dateInputToMsStart(f.from)
          var toMs = dateInputToMsEnd(f.to)
          return state.packageTable.rows.filter(function (r) {
            if (!includesInsensitive(normalizeText(r['案件編號']), caseNeedle)) return false
            if (!includesInsensitive(normalizeText(r['包裹配送編號']), trackNeedle)) return false
            if (fromMs || toMs) {
              var createdMs = parseLooseDateTimeToMs(r['案件建立時間'])
              if (createdMs == null) return false
              if (fromMs && createdMs < fromMs) return false
              if (toMs && createdMs > toMs) return false
            }
            return true
          })
        }

        function filteredKioskRows() {
          var f = state.filters.kiosk
          var storeNeedle = normalizeText(f.store)
          var taskNeedle = normalizeText(f.taskId)
          var vendorMap = { libao: '立保', bochen: '博辰' }
          var abnormalMap = { '1004': '1004', short: '少找錢', state: '狀態錯誤' }
          var vendorKey = vendorMap[f.vendor] || f.vendor
          var abnormalKey = abnormalMap[f.abnormal] || f.abnormal
          var fromMs = dateInputToMsStart(f.from)
          var toMs = dateInputToMsEnd(f.to)
          return state.kioskTable.rows.filter(function (r) {
            var storeId = normalizeText(r['門市編號'])
            var storeName = normalizeText(r['門市名稱'])
            var taskId = normalizeText(r['任務編號'])
            var vendor = normalizeText(r['廠商'])
            var abnormal = normalizeText(r['異常狀況'])
            if (storeNeedle) {
              if (!includesInsensitive(storeId, storeNeedle) && !includesInsensitive(storeName, storeNeedle))
                return false
            }
            if (!includesInsensitive(taskId, taskNeedle)) return false
            if (vendorKey && !includesInsensitive(vendor, vendorKey)) return false
            if (abnormalKey && !includesInsensitive(abnormal, abnormalKey)) return false
            if (fromMs || toMs) {
              var t1 = parseLooseDateTimeToMs(r['異常發生時間'])
              var t2 = parseLooseDateTimeToMs(r['更新時間'])
              var createdMs = t1 != null ? t1 : t2
              if (createdMs == null) return false
              if (fromMs && createdMs < fromMs) return false
              if (toMs && createdMs > toMs) return false
            }
            return true
          })
        }

        function liveAllRows() {
          return state.liveExtra.concat(state.liveTable.rows)
        }

        function filteredLiveRows() {
          var f = state.filters.live
          var raw = normalizeText(f.trackingRaw)
          var list = raw
            ? raw
                .split(',')
                .map(function (s) {
                  return s.trim()
                })
                .filter(Boolean)
            : []
          var fromMs = dateInputToMsStart(f.from)
          var toMs = dateInputToMsEnd(f.to)
          return liveAllRows().filter(function (r) {
            var tracking = normalizeText(r['包裹配送編號'])
            if (list.length > 0 && list.indexOf(tracking) === -1) return false
            if (fromMs || toMs) {
              var createdMs = parseLooseDateTimeToMs(r['查詢建立時間'])
              if (createdMs == null) return false
              if (fromMs && createdMs < fromMs) return false
              if (toMs && createdMs > toMs) return false
            }
            return true
          })
        }

        function currentFilteredRows() {
          if (state.activeTab === TAB_PACKAGE) return filteredPackageRows()
          if (state.activeTab === TAB_KIOSK) return filteredKioskRows()
          return filteredLiveRows()
        }

        /** 詳情頁上一筆／下一筆：依進入詳情時的列表來源（detailFrom） */
        function detailNavRows() {
          if (state.detailFrom === TAB_KIOSK) return filteredKioskRows()
          if (state.detailFrom === TAB_LIVE) return filteredLiveRows()
          return filteredPackageRows()
        }

        function detailNavIndex() {
          var rows = detailNavRows()
          var row = state.selectedRow
          if (!row) return -1
          var i
          for (i = 0; i < rows.length; i++) {
            if (String(rows[i].key) === String(row.key)) return i
          }
          if (state.detailFrom === TAB_KIOSK) {
            var tid = normalizeText(row['任務編號'])
            for (i = 0; i < rows.length; i++) {
              if (normalizeText(rows[i]['任務編號']) === tid) return i
            }
          } else if (state.detailFrom === TAB_LIVE) {
            var trk = normalizeText(row['包裹配送編號'])
            for (i = 0; i < rows.length; i++) {
              if (normalizeText(rows[i]['包裹配送編號']) === trk) return i
            }
          } else {
            var cid = normalizeText(row['案件編號'])
            var tno = normalizeText(row['包裹配送編號'])
            for (i = 0; i < rows.length; i++) {
              if (
                normalizeText(rows[i]['案件編號']) === cid &&
                normalizeText(rows[i]['包裹配送編號']) === tno
              )
                return i
            }
          }
          return -1
        }

        function goDetailPrev() {
          var rows = detailNavRows()
          var idx = detailNavIndex()
          if (idx <= 0) return
          state.selectedRow = rows[idx - 1]
          state.packageDetailTab = 'pickup'
          state.selectedTrackingTab = '0'
          renderDetail()
        }

        function goDetailNext() {
          var rows = detailNavRows()
          var idx = detailNavIndex()
          if (idx < 0 || idx >= rows.length - 1) return
          state.selectedRow = rows[idx + 1]
          state.packageDetailTab = 'pickup'
          state.selectedTrackingTab = '0'
          renderDetail()
        }

        function currentColumns() {
          if (state.activeTab === TAB_PACKAGE) return state.packageTable.columns
          if (state.activeTab === TAB_KIOSK) return state.kioskTable.columns
          return state.liveTable.columns
        }

        function pageSlice() {
          var all = currentFilteredRows()
          var start = (state.currentPage - 1) * PAGE_SIZE
          return { all: all, pageRows: all.slice(start, start + PAGE_SIZE), total: all.length }
        }

        function setBreadcrumb() {
          var el = document.getElementById('breadcrumb')
          var parts = ['<span>首頁</span>', '<span>SPX 案件排查中心</span>']
          if (state.view === 'list') {
            if (state.activeTab === TAB_PACKAGE) parts.push('<span>包裹案件</span>')
            else if (state.activeTab === TAB_KIOSK) parts.push('<span>繳費機案件</span>')
            else parts.push('<span>即時查詢</span>')
          } else {
            var id = '—'
            if (state.detailFrom === TAB_LIVE) id = normalizeText(state.selectedRow['包裹配送編號']) || '—'
            else if (state.detailFrom === TAB_KIOSK) id = normalizeText(state.selectedRow['任務編號']) || '—'
            else id = normalizeText(state.selectedRow['案件編號']) || '—'
            if (state.detailFrom === TAB_PACKAGE) parts.push('<span>包裹案件</span>')
            else if (state.detailFrom === TAB_KIOSK) parts.push('<span>繳費機案件</span>')
            else parts.push('<span>即時查詢</span>')
            parts.push('<span>' + escapeHtml(id) + '</span>')
          }
          el.innerHTML = parts.join('')
        }

        function setPageDesc() {
          var el = document.getElementById('page-desc')
          if (state.activeTab === TAB_KIOSK) {
            el.textContent =
              '整合門市包裹異常與繳費機事件監控，協助排查設備異常、廠商與影片處理狀態。'
          } else if (state.activeTab === TAB_LIVE) {
            el.textContent = '依包裹配送編號建立即時查詢，檢視查詢紀錄、影片處理狀態與後續動作。'
          } else {
            el.textContent = '整合 SPX 門市異常與監控資料，協助快速排查包裹與影片處理狀態。'
          }
        }

        function renderList() {
          setBreadcrumb()
          setPageDesc()
          document.getElementById('live-toolbar').classList.toggle('hidden', state.activeTab !== TAB_LIVE)
          document.getElementById('page-head').classList.toggle('page-head--live', state.activeTab === TAB_LIVE)

          document.getElementById('filter-package').classList.toggle('hidden', state.activeTab !== TAB_PACKAGE)
          document.getElementById('filter-kiosk').classList.toggle('hidden', state.activeTab !== TAB_KIOSK)
          document.getElementById('filter-live').classList.toggle('hidden', state.activeTab !== TAB_LIVE)

          document.querySelectorAll('.tabs .tab').forEach(function (btn) {
            btn.classList.toggle('is-active', btn.getAttribute('data-tab') === state.activeTab)
          })

          var cols = currentColumns()
          var thead = document.getElementById('table-head')
          var tbody = document.getElementById('table-body')
          var emptyEl = document.getElementById('table-empty')
          var wrap = document.querySelector('.table-wrap')

          if (cols.length === 0) {
            thead.innerHTML = ''
            tbody.innerHTML = ''
            emptyEl.classList.remove('hidden')
            emptyEl.textContent = '尚無資料（CSV 尚未載入或格式不符）。'
            wrap.classList.add('hidden')
            document.querySelector('.pagination-bar').classList.add('hidden')
            return
          }

          var slice = pageSlice()
          emptyEl.classList.toggle('hidden', slice.total > 0)
          wrap.classList.toggle('hidden', slice.total === 0)
          document.querySelector('.pagination-bar').classList.toggle('hidden', slice.total === 0)

          if (slice.total === 0) {
            if (state.activeTab === TAB_PACKAGE) {
              emptyEl.innerHTML =
                '尚無資料，請至 <button type="button" class="btn link" id="empty-goto-live">即時查詢</button> 新增特定包裹資訊與 CCTV'
              var link = document.getElementById('empty-goto-live')
              if (link)
                link.onclick = function () {
                  state.activeTab = TAB_LIVE
                  state.currentPage = 1
                  renderList()
                }
            } else {
              emptyEl.textContent = '沒有符合條件的資料。'
            }
            thead.innerHTML = ''
            tbody.innerHTML = ''
          } else {
            var hr = '<tr>'
            cols.forEach(function (c) {
              hr += '<th>' + escapeHtml(c.title) + '</th>'
            })
            hr += '<th>影片</th></tr>'
            thead.innerHTML = hr

            tbody.innerHTML = ''
            slice.pageRows.forEach(function (row) {
              var tr = document.createElement('tr')
              var html = ''
              cols.forEach(function (c) {
                html += '<td>' + cellHtml(c.key, c.title, row[c.key]) + '</td>'
              })
              var status = normalizeText(row['影片處理狀況'])
              var canView = status === '已完成'
              html +=
                '<td><button type="button" class="btn link ' +
                (canView ? 'video-link' : 'video-link-disabled') +
                '" data-action="view"' +
                (canView ? '' : ' disabled') +
                '>查看</button></td>'
              tr.innerHTML = html
              var btn = tr.querySelector('[data-action="view"]')
              if (btn && canView) {
                btn.onclick = function () {
                  openDetail(row, state.activeTab)
                }
              }
              tbody.appendChild(tr)
            })
          }

          var maxPage = Math.max(1, Math.ceil(slice.total / PAGE_SIZE))
          if (state.currentPage > maxPage) {
            state.currentPage = maxPage
            renderList()
            return
          }
          var start = slice.total === 0 ? 0 : (state.currentPage - 1) * PAGE_SIZE + 1
          var end = Math.min(state.currentPage * PAGE_SIZE, slice.total)
          document.getElementById('page-info').textContent =
            '第 ' + start + '–' + end + ' 筆，共 ' + slice.total + ' 筆'
          document.getElementById('page-prev').disabled = state.currentPage <= 1
          document.getElementById('page-next').disabled = state.currentPage >= maxPage

          document.getElementById('table-body').onclick = function (e) {
            var t = e.target
            if (t && t.getAttribute && t.getAttribute('data-copy') != null) {
              var text = t.getAttribute('data-copy') || ''
              if (text && navigator.clipboard) navigator.clipboard.writeText(text)
            }
          }
        }

        function packageTrackingTabs() {
          var seen = {}
          var unique = []
          state.packageDetail.rows.forEach(function (r) {
            var v = normalizeText(r['包裹配送編號'])
            if (!v || seen[v]) return
            seen[v] = 1
            unique.push(v)
          })
          if (unique.length) return unique
          var fb = normalizeText(state.selectedRow && state.selectedRow['包裹配送編號'])
          return fb ? [fb] : []
        }

        function renderDetailLeftKiosk() {
          var row = state.selectedRow
          var store = normalizeText(row['門市名稱']) || '—'
          var ab = normalizeText(row['異常狀況']) || '—'
          return (
            '<div class="panel">' +
            '<div class="collapse-hd">異常事件資訊</div>' +
            '<div class="collapse-bd">' +
            '<div class="desc-row"><div class="desc-label">門市名稱</div><div>' +
            escapeHtml(store) +
            '</div></div>' +
            '<div class="desc-row"><div class="desc-label">異常狀況</div><div>' +
            escapeHtml(ab) +
            '</div></div>' +
            '</div></div>' +
            '<div class="panel" style="margin-top:12px">' +
            '<div class="collapse-hd">備註</div>' +
            '<div class="collapse-bd">' +
            '<textarea rows="6" style="width:100%;font:inherit;padding:8px;border:1px solid var(--border);border-radius:8px" placeholder="請輸入說明..."></textarea>' +
            '<div class="note-actions"><button type="button" class="btn primary">儲存</button></div>' +
            '</div></div>' +
            '<div class="detail-nav-footer"><button type="button" class="btn" id="detail-prev">上一筆</button><button type="button" class="btn" id="detail-next">下一筆</button></div>'
          )
        }

        function renderDetailLeftPackage() {
          var row = state.selectedRow || {}
          var cols = state.packageDetail.columns
          var head =
            '<tr>' +
            cols
              .map(function (c) {
                return '<th>' + escapeHtml(c.title) + '</th>'
              })
              .join('') +
            '</tr>'
          var body = state.packageDetail.rows
            .map(function (r) {
              return (
                '<tr>' +
                cols
                  .map(function (c) {
                    var val = r[c.key]
                    if (c.title === '訂單狀態' || c.title === '狀態') return '<td>' + renderStatusPill(val) + '</td>'
                    return '<td>' + escapeHtml(normalizeText(val) || '—') + '</td>'
                  })
                  .join('') +
                '</tr>'
              )
            })
            .join('')

          var caseRow = row
          var caseCells = [
            ['案件編號', normalizeText(caseRow['案件編號']) || '—'],
            ['案件摘要', normalizeText(caseRow['案件摘要']) || '—'],
            ['案件說明', normalizeText(caseRow['案件說明']) || '—'],
            ['案件描述', normalizeText(caseRow['案件描述']) || '—'],
            ['用戶類型', normalizeText(caseRow['用戶類型']) || '—'],
            ['包裹配送編號', normalizeText(caseRow['包裹配送編號']) || '—'],
            ['退貨物流編號', normalizeText(caseRow['退貨物流編號']) || '—'],
            ['案件建立時間', normalizeText(caseRow['案件建立時間']) || '—'],
          ]

          var caseTable =
            '<table class="mini"><thead><tr>' +
            caseCells
              .map(function (x) {
                return '<th>' + escapeHtml(x[0]) + '</th>'
              })
              .join('') +
            '</tr></thead><tbody><tr>' +
            caseCells
              .map(function (x) {
                return '<td>' + escapeHtml(x[1]) + '</td>'
              })
              .join('') +
            '</tr></tbody></table>'

          return (
            '<div class="panel">' +
            '<div class="collapse-hd">取件資訊</div>' +
            '<div class="collapse-bd">' +
            '<div class="desc-row"><div class="desc-label">取件任務編號</div><div>2602000857984290</div></div>' +
            '<div class="desc-row"><div class="desc-label">取件任務狀態</div><div>已取件</div></div>' +
            '<div class="desc-row"><div class="desc-label">門市名稱</div><div>[3435] 楊梅新明 - 智取店</div></div>' +
            '</div></div>' +
            '<div class="panel" style="margin-top:12px">' +
            '<div class="collapse-hd">包裹資訊</div>' +
            '<div class="collapse-bd"><div class="mini-table-wrap"><table class="mini"><thead>' +
            head +
            '</thead><tbody>' +
            body +
            '</tbody></table></div></div></div>' +
            '<div class="panel" style="margin-top:12px">' +
            '<div class="collapse-hd">案件資訊</div>' +
            '<div class="collapse-bd"><div class="mini-table-wrap">' +
            caseTable +
            '</div></div></div>' +
            '<div class="panel" style="margin-top:12px">' +
            '<div class="collapse-hd">備註</div>' +
            '<div class="collapse-bd">' +
            '<textarea rows="6" style="width:100%;font:inherit;padding:8px;border:1px solid var(--border);border-radius:8px" placeholder="請輸入說明..."></textarea>' +
            '<div class="note-actions"><button type="button" class="btn primary">儲存</button></div>' +
            '</div></div>' +
            '<div class="detail-nav-footer"><button type="button" class="btn" id="detail-prev">上一筆</button><button type="button" class="btn" id="detail-next">下一筆</button></div>'
          )
        }

        function wireDetailNav() {
          var rows = detailNavRows()
          var idx = detailNavIndex()
          var prev = document.getElementById('detail-prev')
          var next = document.getElementById('detail-next')
          if (prev) {
            prev.disabled = idx <= 0
            prev.onclick = function () {
              goDetailPrev()
            }
          }
          if (next) {
            next.disabled = idx < 0 || idx >= rows.length - 1
            next.onclick = function () {
              goDetailNext()
            }
          }
        }

        function renderGrid(containerId) {
          var el = document.getElementById(containerId)
          el.innerHTML = ''
          for (var i = 0; i < 9; i++) {
            var tile = document.createElement('div')
            tile.className = 'detail-media-tile'
            var ph = document.createElement('div')
            ph.className = 'ph'
            ph.textContent = '尚無監視器'
            tile.appendChild(ph)
            el.appendChild(tile)
          }
        }

        function renderDetailTopTabs() {
          var wrap = document.getElementById('detail-top-tabs')
          var isKiosk = state.detailFrom === TAB_KIOSK
          if (isKiosk) {
            wrap.innerHTML = ''
            return
          }
          var tab = state.packageDetailTab
          wrap.innerHTML =
            '<button type="button" data-ptab="pickup" class="' +
            (tab === 'pickup' ? 'is-active' : '') +
            '">用戶取件</button>' +
            '<button type="button" data-ptab="listing" class="' +
            (tab === 'listing' ? 'is-active' : '') +
            '">門市上架</button>'
          wrap.querySelectorAll('button').forEach(function (b) {
            b.onclick = function () {
              state.packageDetailTab = b.getAttribute('data-ptab')
              renderDetail()
            }
          })
        }

        function renderSubTabs() {
          var holder = document.getElementById('detail-sub-tabs-wrap')
          var tabs = packageTrackingTabs()
          if (state.packageDetailTab !== 'listing' || tabs.length === 0) {
            holder.innerHTML = ''
            return
          }
          var idx = parseInt(state.selectedTrackingTab, 10)
          if (!isFinite(idx) || idx < 0 || idx >= tabs.length) state.selectedTrackingTab = '0'
          var html = ''
          tabs.forEach(function (label, i) {
            html +=
              '<button type="button" class="' +
              (String(i) === state.selectedTrackingTab ? 'is-active' : '') +
              '" data-idx="' +
              i +
              '">' +
              escapeHtml(label) +
              '</button>'
          })
          holder.innerHTML = '<div class="detail-sub-tabs">' + html + '</div>'
          holder.querySelectorAll('button').forEach(function (b) {
            b.onclick = function () {
              state.selectedTrackingTab = b.getAttribute('data-idx')
              renderSubTabs()
            }
          })
        }

        function openDetail(row, fromTab) {
          state.selectedRow = row
          state.detailFrom = fromTab
          state.view = 'detail'
          state.packageDetailTab = 'pickup'
          state.selectedTrackingTab = '0'
          document.getElementById('view-list').classList.add('hidden')
          document.getElementById('view-detail').classList.remove('hidden')
          renderDetail()
        }

        function renderDetail() {
          setBreadcrumb()
          var left = document.getElementById('detail-left')
          var isKiosk = state.detailFrom === TAB_KIOSK

          if (isKiosk) {
            left.innerHTML = renderDetailLeftKiosk()
            document.getElementById('detail-top-tabs').innerHTML = ''
            document.getElementById('detail-sub-tabs-wrap').innerHTML = ''
            document.getElementById('detail-top-tabs').style.display = 'none'
            document.getElementById('detail-sub-tabs-wrap').style.display = 'none'
          } else {
            left.innerHTML = renderDetailLeftPackage()
            document.getElementById('detail-top-tabs').style.display = ''
            renderDetailTopTabs()
            renderSubTabs()
            var showSub =
              state.packageDetailTab === 'listing' && packageTrackingTabs().length > 0
            document.getElementById('detail-sub-tabs-wrap').style.display = showSub ? '' : 'none'
          }
          renderGrid('detail-grid')
          wireDetailNav()
        }

        function backToList() {
          state.view = 'list'
          state.selectedRow = null
          document.getElementById('view-detail').classList.add('hidden')
          document.getElementById('view-list').classList.remove('hidden')
          setBreadcrumb()
        }

        document.getElementById('btn-back').onclick = backToList

        document.querySelectorAll('.tabs .tab').forEach(function (btn) {
          btn.onclick = function () {
            state.activeTab = btn.getAttribute('data-tab')
            state.currentPage = 1
            renderList()
          }
        })

        document.getElementById('pf-submit').onclick = function () {
          state.filters.package = {
            caseId: document.getElementById('pf-case').value,
            trackingNo: document.getElementById('pf-track').value,
            from: document.getElementById('pf-date-from').value,
            to: document.getElementById('pf-date-to').value,
          }
          state.currentPage = 1
          renderList()
        }
        document.getElementById('pf-reset').onclick = function () {
          document.getElementById('pf-case').value = ''
          document.getElementById('pf-track').value = ''
          document.getElementById('pf-date-from').value = ''
          document.getElementById('pf-date-to').value = ''
          state.filters.package = { caseId: '', trackingNo: '', from: '', to: '' }
          state.currentPage = 1
          renderList()
        }

        document.getElementById('kf-submit').onclick = function () {
          state.filters.kiosk = {
            store: document.getElementById('kf-store').value,
            taskId: document.getElementById('kf-task').value,
            vendor: document.getElementById('kf-vendor').value,
            abnormal: document.getElementById('kf-abnormal').value,
            from: document.getElementById('kf-date-from').value,
            to: document.getElementById('kf-date-to').value,
          }
          state.currentPage = 1
          renderList()
        }
        document.getElementById('kf-reset').onclick = function () {
          document.getElementById('kf-store').value = ''
          document.getElementById('kf-task').value = ''
          document.getElementById('kf-vendor').value = ''
          document.getElementById('kf-abnormal').value = ''
          document.getElementById('kf-date-from').value = ''
          document.getElementById('kf-date-to').value = ''
          state.filters.kiosk = { store: '', taskId: '', vendor: '', abnormal: '', from: '', to: '' }
          state.currentPage = 1
          renderList()
        }

        document.getElementById('lf-submit').onclick = function () {
          state.filters.live = {
            trackingRaw: document.getElementById('lf-tracking').value,
            from: document.getElementById('lf-date-from').value,
            to: document.getElementById('lf-date-to').value,
          }
          state.currentPage = 1
          renderList()
        }
        document.getElementById('lf-reset').onclick = function () {
          document.getElementById('lf-tracking').value = ''
          document.getElementById('lf-date-from').value = ''
          document.getElementById('lf-date-to').value = ''
          state.filters.live = { trackingRaw: '', from: '', to: '' }
          state.currentPage = 1
          renderList()
        }

        document.getElementById('page-prev').onclick = function () {
          if (state.currentPage > 1) {
            state.currentPage--
            renderList()
          }
        }
        document.getElementById('page-next').onclick = function () {
          var total = currentFilteredRows().length
          var maxPage = Math.max(1, Math.ceil(total / PAGE_SIZE))
          if (state.currentPage < maxPage) {
            state.currentPage++
            renderList()
          }
        }

        function liveTrackingSet() {
          var s = {}
          liveAllRows().forEach(function (r) {
            var t = normalizeText(r['包裹配送編號'])
            if (t) s[t] = 1
          })
          return s
        }

        function isValidTrackingNo(v) {
          return /^TW[0-9A-Z]{6,24}$/i.test(normalizeText(v))
        }

        document.getElementById('btn-live-create').onclick = function () {
          document.getElementById('modal-tracking').value = ''
          document.getElementById('modal-dup-err').classList.add('hidden')
          document.getElementById('modal-live').classList.remove('hidden')
        }
        document.getElementById('modal-cancel').onclick = function () {
          document.getElementById('modal-live').classList.add('hidden')
        }
        document.getElementById('modal-ok').onclick = function () {
          var trackingNo = normalizeText(document.getElementById('modal-tracking').value)
          var err = document.getElementById('modal-dup-err')
          err.classList.add('hidden')
          if (!trackingNo) return
          if (!isValidTrackingNo(trackingNo)) {
            err.textContent = '包裹配送編號格式錯誤'
            err.classList.remove('hidden')
            return
          }
          if (liveTrackingSet()[trackingNo]) {
            err.textContent = '包裹配送編號已存在'
            err.classList.remove('hidden')
            return
          }
          var now = new Date()
          var pad = function (n) {
            return String(n).padStart(2, '0')
          }
          var nowStr =
            now.getFullYear() +
            '-' +
            pad(now.getMonth() + 1) +
            '-' +
            pad(now.getDate()) +
            ' ' +
            pad(now.getHours()) +
            ':' +
            pad(now.getMinutes()) +
            ':' +
            pad(now.getSeconds())
          state.liveExtra.unshift({
            key: 'live-extra-' + Date.now(),
            包裹配送編號: trackingNo,
            查詢建立時間: nowStr,
            查詢者: 'vera.yang@shopee.tw',
            備註: '',
            影片處理狀況: '下載中',
          })
          document.getElementById('modal-live').classList.add('hidden')
          state.currentPage = 1
          renderList()
        }

        try {
          state.packageTable = parseCsvText(readEmbeddedCsv('csv-package'))
          state.packageDetail = parseCsvText(readEmbeddedCsv('csv-package-detail'))
          state.kioskTable = parseCsvText(readEmbeddedCsv('csv-kiosk'))
          state.liveTable = parseCsvText(readEmbeddedCsv('csv-live'))
        } catch (e) {}
        renderList()
      })()
    </script>
  </body>
</html>
